apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/openshift/jenkins?rev={{revision}}
    build.appstudio.redhat.com/commit_sha: '{{revision}}'
    build.appstudio.redhat.com/target_branch: '{{target_branch}}'
    pipelinesascode.tekton.dev/cancel-in-progress: "false"
    pipelinesascode.tekton.dev/max-keep-runs: "3"
    pipelinesascode.tekton.dev/on-cel-expression: |
      event == "push" && target_branch == "release-rhel8" && ( "slave-base/***".pathChanged() || ".tekton/***".pathChanged() || "rpms-4-15/rpms.lock.yaml".pathChanged() || "rpms-4-15/rpms.in.yaml".pathChanged() || "ubi.repo".pathChanged() || "artifacts.lock.yaml".pathChanged() )
  creationTimestamp: null
  labels:
    appstudio.openshift.io/application: openshift-jenkins-rhel8
    appstudio.openshift.io/component: jenkins-agent-base-rhel8-4-14
    pipelines.appstudio.openshift.io/type: build
  name: jenkins-agent-base-rhel8-4-14-on-push
  namespace: ocp-tools-jenkins-tenant
spec:
  params:
    - name: git-url
      value: '{{source_url}}'
    - name: revision
      value: '{{revision}}'
    - name: output-image
      value: quay.io/redhat-user-workloads/ocp-tools-jenkins-tenant/jenkins-agent-base-rhel8-4-14:{{revision}}
    - name: build-platforms
      value:
        - linux/x86_64
        - linux/arm64
        - linux/ppc64le
        - linux/s390x
    - name: dockerfile
      value: slave-base/Dockerfile.rhel8
    - name: path-context
      value: slave-base
    - name: build-source-image
      value: "true"
    - name: hermetic
      value: "true"
    - name: prefetch-input
      value: '{"packages": [{"type": "generic"},{"type": "rpm", "path": "rpms-4-15"}]}'
    - name: build-args
      value:
        - OCP_VERSION=4.14
        - CI_UPSTREAM_COMMIT={{revision}}
        - CI_UPSTREAM_URL={{source_url}}
    - name: build-args-file
      value: konflux-build-args.env
    - name: LABELS
      value:
        - "io.openshift.release.version=4.14"
        - "version=4.14"
        - "cpe=cpe:/a:redhat:openshift:4.14::el8"
  taskRunTemplate:
    serviceAccountName: build-pipeline-jenkins-agent-base-rhel8-4-14
  workspaces:
    - name: git-auth
      secret:
        secretName: '{{ git_auth_secret }}'
  pipelineRef:
    name: build-pipeline
status: {}
